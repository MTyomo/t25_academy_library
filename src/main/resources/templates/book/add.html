<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <td><span class="required-info">＊は必須項目です</span></td>
                    <div class="mb30 flexarea">
                        <span class="back-link">
                            <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                        </span>
                    </div>
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <form id="add_form" th:action="@{/book/add}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="form-group">
                                <div class="label-error-row">
                                    <label for="title">
                                        書籍名<span class="required-info">*</span> <!-- *のみ赤色 -->
                                    </label>
                                    <div th:if="${titleErrors}">
                                        <ul>
                                            <div th:each="error : ${titleErrors}">
                                                <p th:text="${error}" style="color: red; font-weight: bold;"></p>
                                            </div>
                                        </ul>
                                    </div>
                                    <input type="text" id="title" name="title" placeholder="書籍名を入力"
                                        th:field="*{title}" />
                                </div>

                                <div class="form-group">
                                    <div class="label-error-row">
                                    <label for="isbn">
                                        ISBN<span class="required-info">*</span> <!-- *のみ赤色 -->
                                    </label>
                                    <div th:if="${isbnErrors}">
                                        <ul>
                                            <div th:each="error : ${isbnErrors}">
                                                <p th:text="${error}" style="color: red; font-weight: bold;"></p>
                                            </div>
                                        </ul>
                                    </div>
                                    <input type="text" id="isbn" name="isbn" placeholder="ISBNを入力" th:field="*{isbn}" />
                                </div>

                                <div class="btn_block">
                                    <button type="submit" id="submit_btn">保存</button>
                                </div>
                        </form>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>

</body>
