<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧</div>
                <!-- 書籍登録のボタン -->
                <div class="btn_block">
                    <a th:href="@{/book/add}" method="get" class="add-book-form">
                        <button type="submit" class="add-book-btn">
                            <img th:src="@{/images/icons/add.png}" alt="追加" class="icon-image">
                            書籍登録
                        </button>
                    </a>
                </div>
                <!-- 書籍一覧のタイトル -->
                <div class="table_title">書籍一覧</div>

                <table class="book_table" border="1" style="margin-left: 80px;">
                    <thead>
                        <tr>
                            <th>書籍名</th>
                            <th>ISBN</th>
                            <th>利用可能在庫数</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${bookMstList}">
                            <td>
                                <!-- 編集ボタン -->
                                <a th:href="@{/book/edit/{id}(id=${book.id})}" class="icon-button">
                                    <img th:src="@{/images/icons/edit.png}" alt="編集" class="icon-button">
                                </a>
                                <!-- 削除ボタン -->
                                <button type="button" th:data-id="${book.id}" th:data-title="${book.title}"
                                    th:data-isbn="${book.isbn}"
                                    onclick="openDeletePopup(this.dataset.id, this.dataset.title, this.dataset.isbn)">
                                    <img th:src="@{/images/icons/trash.png}" alt="削除アイコン" class="icon-button">
                                </button>


                                <div class="wrap-title" th:text="${book.title}"></div>
                            </td>
                            <td th:text="${book.isbn}"></td>
                            </td>
                            <!-- ここに利用可能在庫数入れるはず -->
                            <td>
                        </tr>
                    </tbody>
                    <!-- 編集機能ポップアップ -->
                    <div class="popup" th:if="${popupMessage}">
                        <div id="customPopup" class="popup-content">
                            <span class="close-btn" onclick="closePopup()">&times;</span>
                            <p th:text="${popupMessage}"></p>
                        </div>
                    </div>

                    <div id="customPopup" class="popup" th:if="${errorMessage}">
                        <div class="popup-content">
                            <span class="close-btn" onclick="closePopup()">&times;</span>
                            <p th:text="${errorMessage}"></p>
                        </div>
                    </div>

                

                    <!-- 削除確認ポップアップ -->
                    <div id="deleteConfirmPopup" class="popup" style="display:none;">
                        <div class="popup-content">
                            <p>本当に削除しますか？</p>
                            <!-- <p th:text="${bookId}"></p> -->
                            <span class="close-btn" onclick="closePopup()">&times;</span>
                            <p><span id="bookTitle"></span></p>
                            <p><span id="bookIsbn"></span></p>
                            <button onclick="closePopup()">キャンセル</button>
                            
                            <button type="button" 
                            onclick="deleteBook(deleteTargetId)">削除</button>
                        </div>
                    </div>

                    <!-- 削除完了ポップアップ -->
                    <div id="deleteSuccessPopup" class="popup" style="display:none;">
                        <div class="popup-content">
                            <p>削除が完了しました！</p>
                        </div>
                    </div>


                    <!-- 外部JS
                    <script th:src="@{/js/index.js}"></script> -->
                    <!-- OKな例 -->
                    <!-- <script type="text/javascript" th:src="@{/js/book/index.js}"></script> -->


                </table>
                <div th:replace="~{common :: footer}"></div>
            </div>
        </div>
</body>
